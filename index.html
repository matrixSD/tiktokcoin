<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن عملات تيك توك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container animate__animated animate__fadeIn">
        <h1 class="main-title">احصل على عملات</h1>

        <div class="user-input-section">
            <i class="fa-solid fa-user icon"></i>
            <input type="text" id="username" placeholder="اكتب اليوزر هنا...">
        </div>

        <p class="promo-text">
            <i class="fa-solid fa-circle-info"></i> 
            الشحن: <span>وفر حوالي 25% مع رسوم خدمة أقل للجهات الخارجية.</span>
        </p>

        <div class="coins-grid">
            <div class="coin-card" data-amount="30" data-price="0.31">
                <div class="coin-count">30 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$0.31</div>
            </div>
            <div class="coin-card" data-amount="350" data-price="3.65">
                <div class="coin-count">350 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$3.65</div>
            </div>
            <div class="coin-card" data-amount="700" data-price="7.25">
                <div class="coin-count">700 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$7.25</div>
            </div>
            <div class="coin-card" data-amount="1400" data-price="14.49">
                <div class="coin-count">1,400 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$14.49</div>
            </div>
            <div class="coin-card" data-amount="3500" data-price="36.2">
                <div class="coin-count">3,500 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$36.2</div>
            </div>
            <div class="coin-card" data-amount="7000" data-price="72.39">
                <div class="coin-count">7,000 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$72.39</div>
            </div>
            <div class="coin-card" data-amount="17500" data-price="180.99">
                <div class="coin-count">17,500 <span class="coin-icon">🪙</span></div>
                <div class="coin-price">US$180.99</div>
            </div>
            <div class="coin-card custom-card" id="custom-trigger">
                <div class="coin-count">مخصص <span class="coin-icon">🪙</span></div>
                <input type="number" id="custom-amount" placeholder="اكتب الكمية..." min="1">
            </div>
        </div>

        <div class="footer-section">
            <div class="total-price">الإجمالي: <span id="total-val">US$0</span></div>
            <button id="charge-btn" class="charge-btn" disabled>الشحن</button>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="status-box" id="status-box">
            <div class="loader" id="loader"></div>
            <i class="fa-solid fa-circle-check success-icon" id="success-icon" style="display: none;"></i>
            <p id="status-text">جاري شحن العملات...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
